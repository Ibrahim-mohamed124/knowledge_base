<ul>
  <li>View the health status of the Ceph cluster by using the <code>oc get</code> command.</li>
</ul>
<pre><code class="language-plaintext">oc get cephcluster</code></pre>
<ul>
  <li>View the cluster health details by using the <code>oc describe</code> command.</li>
</ul>
<pre><code class="language-plaintext">oc describe cephcluster | grep "^Status" -A15</code></pre>
