<h3>Supported versions of flasharray and flashblade</h3>
<ul>
  <li>flasharray &gt; 6.3 and up&nbsp;</li>
  <li>flashblade &gt; 4.3 and up</li>
</ul>
<h3><strong>Software requirements</strong></h3>
<ul>
  <li>verify that this package exist <code>iscsi-initiator-utils</code></li>
</ul>
<pre><code class="language-plaintext"> systemctl status iscsid
  cat /etc/iscsi/initiatorname.iscsi
</code></pre>
